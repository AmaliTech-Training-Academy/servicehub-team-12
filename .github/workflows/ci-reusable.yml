name: Backend CI (Reusable)

on:
    workflow_call:
        inputs:
            run_checkstyle:
                type: boolean
                required: false
                default: false
            run_tests:
                type: boolean
                required: false
                default: false
            build_image:
                type: boolean
                required: false
                default: false
            push_image:
                type: boolean
                required: false
                default: false
            run_checkov:
                type: boolean
                required: false
                default: false
            run_data_tests:
                type: boolean
                required: false
                default: false
            run_trivy:
                type: boolean
                required: false
                default: false
            run_sbom:
                type: boolean
                required: false
                default: false
            deploy_dags:
                type: boolean
                required: false
                default: false
        outputs:
          image_tag:
            description: Short SHA tag used for Docker image
            value: ${{ jobs['build-and-push-image'].outputs.image_tag }}

jobs:
    checkstyle:
        permissions:
            contents: read
            id-token: write
        name: Backend checkstyle
        runs-on: ubuntu-latest
        if: inputs.run_checkstyle
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Java
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "25"
                  cache: maven

            - name: Run checkstyle
              working-directory: backend
              run: mvn -B -DskipTests checkstyle:check

    trivy:
        permissions:
            contents: read
            id-token: write
        name: Trivy Security Scan
        runs-on: ubuntu-latest
        if: inputs.run_trivy
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Run Trivy vulnerability scanner
              uses: aquasecurity/trivy-action@master
              with:
                  scan-type: 'fs'
                  format: 'table'
                  exit-code: '1'
                  severity: 'CRITICAL,HIGH'

    sbom:
        permissions:
            contents: read
        name: Generate SBOM
        runs-on: ubuntu-latest
        if: inputs.run_sbom
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Generate SBOM
              uses: anchore/sbom-action@v0
              with:
                  format: 'spdx-json'
                  artifact-name: 'sbom.spdx.json'

    checkov:
        permissions:
            contents: read
            id-token: write
        name: Checkov Infrastructure Scan
        runs-on: ubuntu-latest
        if: inputs.run_checkov
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Run Checkov
              uses: bridgecrewio/checkov-action@master
              with:
                  directory: ops-engine-room/infrastructure
                  quiet: true
                  soft_fail: true
                  skip_check: CKV_AWS_1,CKV_AWS_2,CKV_TF_1,CKV_AWS_144,CKV_AWS_18,CKV_AWS_145

    data-tests:
        permissions:
            contents: read
        name: Data Engineering Lint & Test
        runs-on: ubuntu-latest
        if: inputs.run_data_tests
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.10"

            - name: Restore uv cache
              uses: actions/cache@v4
              with:
                  path: ~/.cache/uv
                  key: uv-${{ runner.os }}-${{ hashFiles('data-engineering/requirements.txt') }}
                  restore-keys: |
                      uv-${{ runner.os }}-

            - name: Set up uv
              uses: astral-sh/setup-uv@v5
              with:
                  version: "0.6.7"

            - name: Install dependencies
              working-directory: data-engineering
              run: |
                  uv venv
                  source .venv/bin/activate
                  uv pip install -r requirements.txt
                  uv pip install flake8 pytest

            - name: Lint with flake8
              working-directory: data-engineering
              run: |
                  source .venv/bin/activate
                  # stop the build if there are Python syntax errors or undefined names
                  flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=.venv
                  # exit-zero treats all errors as warnings
                  flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --exclude=.venv

            - name: Run tests
              working-directory: data-engineering
              run: |
                  source .venv/bin/activate
                  PYTHONPATH=. pytest

    test:
        permissions:
            contents: read
            id-token: write
        name: Backend tests
        runs-on: ubuntu-latest
        if: inputs.run_tests
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Java
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "25"
                  cache: maven

            - name: Run tests
              working-directory: backend
              run: mvn -B test

    build-and-push-image:
        permissions:
            contents: read
            id-token: write
        name: Build and Push Docker image
        runs-on: ubuntu-latest
        needs: [checkstyle, test]
        if: inputs.build_image && (needs.checkstyle.result == 'success' || needs.checkstyle.result == 'skipped') && (needs.test.result == 'success' || needs.test.result == 'skipped')
        outputs:
            image_tag: ${{ steps.meta.outputs.image_tag }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Compute image tag
              id: meta
              run: |
                  TAG=$(git rev-parse --short=12 HEAD)
                  echo "image_tag=$TAG" >> "$GITHUB_OUTPUT"

            - name: Configure AWS credentials
              if: inputs.push_image
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
                  aws-region: ${{ secrets.AWS_REGION }}

            - name: Login to Amazon ECR
              if: inputs.push_image
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2

            - name: Build and Push Image
              uses: docker/build-push-action@v6
              with:
                  context: backend
                  file: backend/Dockerfile
                  tags: |
                      ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ steps.meta.outputs.image_tag }}
                      ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest
                  push: ${{ inputs.push_image }}
                  load: ${{ !inputs.push_image }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    deploy-dags:
        name: Deploy Airflow Config via SSM
        runs-on: ubuntu-latest
        needs: data-tests
        if: inputs.deploy_dags && (needs.data-tests.result == 'success' || needs.data-tests.result == 'skipped')
        permissions:
            contents: read
            id-token: write
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
                  aws-region: ${{ secrets.AWS_REGION }}

            - name: Generate .env file
              working-directory: data-engineering
              run: |
                  set -euo pipefail

                  SECRET_ID="${{ secrets.RDS_CREDENTIALS_SECRET_ID }}"
                  if [ -z "$SECRET_ID" ]; then
                    echo "RDS_CREDENTIALS_SECRET_ID is required"
                    exit 1
                  fi

                  SECRET_JSON=$(aws secretsmanager get-secret-value \
                    --secret-id "$SECRET_ID" \
                    --query 'SecretString' \
                    --output text)

                  DB_HOST=$(python3 -c 'import json,sys; print(json.load(sys.stdin)["host"])' <<< "$SECRET_JSON")
                  DB_PORT=$(python3 -c 'import json,sys; print(json.load(sys.stdin)["port"])' <<< "$SECRET_JSON")
                  DB_NAME=$(python3 -c 'import json,sys; print(json.load(sys.stdin)["dbname"])' <<< "$SECRET_JSON")
                  DB_USER=$(python3 -c 'import json,sys; print(json.load(sys.stdin)["username"])' <<< "$SECRET_JSON")
                  DB_PASSWORD=$(python3 -c 'import json,sys; print(json.load(sys.stdin)["password"])' <<< "$SECRET_JSON")
                  DB_USER_URI=$(python3 -c 'import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1], safe=""))' "$DB_USER")
                  DB_PASSWORD_URI=$(python3 -c 'import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1], safe=""))' "$DB_PASSWORD")

                  AIRFLOW_DB="${{ secrets.AIRFLOW_DB }}"
                  AIRFLOW_WEB_PORT="${{ secrets.AIRFLOW_WEB_PORT }}"
                  AIRFLOW_UID="${{ secrets.AIRFLOW_UID }}"
                  AIRFLOW_ADMIN_USER="${{ secrets.AIRFLOW_ADMIN_USER }}"
                  AIRFLOW_ADMIN_PASSWORD="${{ secrets.AIRFLOW_ADMIN_PASSWORD }}"
                  LOG_LEVEL="${{ secrets.LOG_LEVEL }}"
                  ETL_WINDOW_DAYS="${{ secrets.ETL_WINDOW_DAYS }}"
                  AWS_REGION="${{ secrets.AWS_REGION }}"
                  CLOUDWATCH_LOG_GROUP="${{ secrets.CLOUDWATCH_LOG_GROUP }}"

                  [ -n "$AIRFLOW_DB" ] || AIRFLOW_DB="airflow"
                  [ -n "$AIRFLOW_WEB_PORT" ] || AIRFLOW_WEB_PORT="8080"
                  [ -n "$AIRFLOW_UID" ] || AIRFLOW_UID="50000"
                  [ -n "$AIRFLOW_ADMIN_USER" ] || AIRFLOW_ADMIN_USER="airflow"
                  [ -n "$AIRFLOW_ADMIN_PASSWORD" ] || AIRFLOW_ADMIN_PASSWORD="airflow_pass"
                  [ -n "$LOG_LEVEL" ] || LOG_LEVEL="INFO"
                  [ -n "$ETL_WINDOW_DAYS" ] || ETL_WINDOW_DAYS="7"
                  [ -n "$AWS_REGION" ] || AWS_REGION="eu-west-1"
                  [ -n "$CLOUDWATCH_LOG_GROUP" ] || CLOUDWATCH_LOG_GROUP="/servicehub/staging/airflow/containers"

                  {
                    echo "DB_HOST=$DB_HOST"
                    echo "DB_PORT=$DB_PORT"
                    echo "DB_NAME=$DB_NAME"
                    echo "DB_USER=$DB_USER"
                    echo "DB_PASSWORD=$DB_PASSWORD"
                    echo "DB_USER_URI=$DB_USER_URI"
                    echo "DB_PASSWORD_URI=$DB_PASSWORD_URI"
                    echo "AIRFLOW_DB=$AIRFLOW_DB"
                    echo "AIRFLOW_WEB_PORT=$AIRFLOW_WEB_PORT"
                    echo "AIRFLOW_UID=$AIRFLOW_UID"
                    echo "AIRFLOW_ADMIN_USER=$AIRFLOW_ADMIN_USER"
                    echo "AIRFLOW_ADMIN_PASSWORD=$AIRFLOW_ADMIN_PASSWORD"
                    echo "LOG_LEVEL=$LOG_LEVEL"
                    echo "ETL_WINDOW_DAYS=$ETL_WINDOW_DAYS"
                    echo "AWS_REGION=$AWS_REGION"
                    echo "CLOUDWATCH_LOG_GROUP=$CLOUDWATCH_LOG_GROUP"
                  } > .env

            - name: Archive data-engineering directory
              run: tar -czf data-engineering.tar.gz data-engineering/

            - name: Upload to S3 Artifacts Bucket
              run: |
                  aws s3 cp data-engineering.tar.gz s3://${{ secrets.S3_DATA_ENGINEERING_BUCKET }}/deployments/data-engineering.tar.gz

            - name: Trigger SSM Deployment
              run: |
                  set -euo pipefail

                  COMMAND_ID=$(aws ssm send-command \
                    --targets "Key=tag:Role,Values=AirflowDockerHost" \
                    --document-name "AWS-RunShellScript" \
                    --comment "Deploy data-engineering artifact from GitHub Actions" \
                    --parameters 'commands=["mkdir -p /opt/data-engineering", "aws s3 cp s3://${{ secrets.S3_DATA_ENGINEERING_BUCKET }}/deployments/data-engineering.tar.gz /tmp/data-engineering.tar.gz", "tar -xzf /tmp/data-engineering.tar.gz -C /opt/", "cd /opt/data-engineering", "docker compose down || true", "docker compose up -d --build"]' \
                    --query "Command.CommandId" \
                    --output text)

                  echo "Waiting for SSM command $COMMAND_ID to complete..."

                  INSTANCE_IDS=""
                  for _ in {1..15}; do
                    INSTANCE_IDS=$(aws ssm list-command-invocations \
                      --command-id "$COMMAND_ID" \
                      --details \
                      --query 'CommandInvocations[].InstanceId' \
                      --output text)

                    if [ -n "$INSTANCE_IDS" ] && [ "$INSTANCE_IDS" != "None" ]; then
                      break
                    fi

                    sleep 2
                  done

                  if [ -z "$INSTANCE_IDS" ] || [ "$INSTANCE_IDS" = "None" ]; then
                    echo "No SSM command invocations found for command $COMMAND_ID."
                    echo "Verify at least one managed instance is online and tagged Role=AirflowDockerHost."
                    aws ssm describe-instance-information \
                      --query 'InstanceInformationList[].{InstanceId:InstanceId,PingStatus:PingStatus,LastPingDateTime:LastPingDateTime}' \
                      --output table || true
                    exit 1
                  fi

                  TIMEOUT=900   # 15 minutes
                  INTERVAL=15  # poll every 15 seconds

                  for INSTANCE_ID in $INSTANCE_IDS; do
                    echo "Waiting for command $COMMAND_ID on instance $INSTANCE_ID (timeout: ${TIMEOUT}s)"
                    ELAPSED=0
                    while true; do
                      STATUS=$(aws ssm get-command-invocation \
                        --command-id "$COMMAND_ID" \
                        --instance-id "$INSTANCE_ID" \
                        --region "${{ secrets.AWS_REGION }}" \
                        --query 'Status' \
                        --output text)

                      echo "  [$ELAPSED s] Status: $STATUS"

                      if [ "$STATUS" = "Success" ]; then
                        echo "Command succeeded on $INSTANCE_ID"
                        break
                      elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
                        echo "Command failed on $INSTANCE_ID with status: $STATUS"
                        aws ssm get-command-invocation \
                          --command-id "$COMMAND_ID" \
                          --instance-id "$INSTANCE_ID" \
                          --region "${{ secrets.AWS_REGION }}" \
                          --query '{StandardOutputContent:StandardOutputContent,StandardErrorContent:StandardErrorContent}' \
                          --output json || true
                        exit 1
                      fi

                      if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
                        echo "Timed out after ${TIMEOUT}s waiting for command on $INSTANCE_ID"
                        exit 1
                      fi

                      sleep "$INTERVAL"
                      ELAPSED=$((ELAPSED + INTERVAL))
                    done
                  done
