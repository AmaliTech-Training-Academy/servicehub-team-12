<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{components/layout :: page(~{::content})}">
<head><title>My Requests</title></head>
<body>
  <div th:fragment="content">

    <div class="flex items-center justify-between mb-6">
      <div>
        <h2 class="text-2xl font-semibold text-foreground">My Requests</h2>
        <p class="text-sm text-muted-foreground-1">All service requests you have submitted.</p>
      </div>
      <a th:href="@{/requests/new}"
         class="py-2 px-4 inline-flex items-center gap-x-2 text-sm font-semibold rounded-lg bg-primary border border-primary-line text-primary-foreground hover:bg-primary-hover focus:outline-hidden focus:bg-primary-focus disabled:opacity-50 disabled:pointer-events-none transition">
        <svg class="size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
        </svg>
        New Request
      </a>
    </div>

    <!-- Table -->
    <div th:if="${tickets == null or #lists.isEmpty(tickets)}"
         class="bg-white border border-card-line rounded-xl shadow-sm p-4 sm:p-5">
      <div class="flex flex-col items-center justify-center py-16 text-center">
        <svg class="size-10 text-muted-foreground-2 opacity-30 mb-3" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/>
        </svg>
        <p class="text-sm text-muted-foreground-1">No requests found.</p>
        <a th:href="@{/requests/new}" class="mt-2 text-sm font-medium text-primary hover:underline">Submit your first request →</a>
      </div>
    </div>

    <div th:if="${tickets != null and not #lists.isEmpty(tickets)}"
         id="hs-datatable-filter"
         class="bg-white border border-card-line rounded-xl shadow-sm p-4 sm:p-5 flex flex-col --prevent-on-load-init"
         data-hs-datatable='{
           "pageLength": 10,
           "pagingOptions": {
             "pageBtnClasses": "min-w-10 flex justify-center items-center text-foreground hover:bg-muted-hover focus:outline-hidden focus:bg-muted-focus py-2.5 text-sm rounded-full disabled:opacity-50 disabled:pointer-events-none"
           },
           "selecting": true,
           "rowSelectingOptions": {
             "selectAllSelector": "#hs-datatable-select-all-rows",
             "individualSelector": ".hs-datatable-select-row"
           },
           "language": {
             "zeroRecords": "<div class=&quot;p-5 h-full flex flex-col justify-center items-center text-center&quot;><div class=&quot;max-w-sm mx-auto&quot;><p class=&quot;mt-2 text-sm text-muted-foreground&quot;>No matching requests</p></div></div>"
           }
         }'>
      <div class="flex flex-wrap items-center gap-2 mb-4">
        <div class="grow">
          <div class="relative max-w-xs w-full">
            <label for="hs-table-filter-search" class="sr-only">Search</label>
            <input type="text" name="hs-table-filter-search" id="hs-table-filter-search"
                   class="py-1.5 sm:py-2 px-3 ps-9 block w-full bg-layer border-layer-line shadow-2xs rounded-lg sm:text-sm text-foreground placeholder:text-muted-foreground-1 focus:z-10 focus:border-primary-focus focus:ring-primary-focus disabled:opacity-50 disabled:pointer-events-none"
                   placeholder="Search requests"
                   data-hs-datatable-search>
            <div class="absolute inset-y-0 start-0 flex items-center pointer-events-none ps-3">
              <svg class="size-4 text-muted-foreground" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            </div>
          </div>
        </div>

        <div class="flex-1 flex items-center justify-end space-x-2">
          <select class="hidden" data-hs-select='{
            "toggleTag": "<button type=&quot;button&quot; aria-expanded=&quot;false&quot;><span data-title></span></button>",
            "toggleClasses": "hs-select-disabled:pointer-events-none hs-select-disabled:opacity-50 relative py-2 px-3 pe-9 flex text-nowrap w-full cursor-pointer bg-layer border border-layer-line rounded-lg text-start text-sm text-layer-foreground shadow-2xs hover:bg-layer-hover focus:outline-hidden focus:bg-layer-focus before:absolute before:inset-0 before:z-1",
            "dropdownClasses": "end-0 mt-2 z-50 w-20 max-h-72 p-1 space-y-0.5 bg-select border border-select-line rounded-lg shadow-md overflow-hidden overflow-y-auto [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-none [&::-webkit-scrollbar-track]:bg-scrollbar-track [&::-webkit-scrollbar-thumb]:bg-scrollbar-thumb",
            "optionClasses": "py-2 px-3 w-full text-sm text-select-item-foreground cursor-pointer hover:bg-select-item-hover rounded-md focus:outline-hidden focus:bg-select-item-focus",
            "optionTemplate": "<div class=&quot;flex justify-between items-center w-full&quot;><span data-title></span><span class=&quot;hidden hs-selected:block&quot;><svg class=&quot;shrink-0 size-3.5 text-primary&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;24&quot; height=&quot;24&quot; viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot; stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot;><polyline points=&quot;20 6 9 17 4 12&quot;/></svg></span></div>",
            "extraMarkup": "<div class=&quot;absolute top-1/2 end-3 -translate-y-1/2&quot;><svg class=&quot;shrink-0 size-3.5 text-foreground&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;24&quot; height=&quot;24&quot; viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot; stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot;><path d=&quot;m7 15 5 5 5-5&quot;/><path d=&quot;m7 9 5-5 5 5&quot;/></svg></div>"
          }' data-hs-datatable-page-entities>
            <option value="10" selected>10</option>
            <option value="15">15</option>
            <option value="20">20</option>
            <option value="25">25</option>
            <option value="50">50</option>
          </select>

          <div class="hs-dropdown [--auto-close:inside] [--placement:bottom-right] relative sm:inline-flex z-20">
            <button id="hs-dropdown-filter" type="button" class="hs-dropdown-toggle py-2 px-3 inline-flex items-center gap-x-2 text-sm rounded-lg bg-layer border border-layer-line text-layer-foreground shadow-2xs hover:bg-layer-hover focus:outline-hidden focus:bg-layer-focus disabled:opacity-50 disabled:pointer-events-none">
              Filter
              <svg class="hs-dropdown-open:rotate-180 size-2.5" width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M2 5L8.16086 10.6869C8.35239 10.8637 8.64761 10.8637 8.83914 10.6869L15 5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </button>

            <div class="hs-dropdown-menu transition-[opacity,margin] duration hs-dropdown-open:opacity-100 opacity-0 hidden bg-dropdown border border-dropdown-line shadow-md rounded-lg p-2" aria-labelledby="hs-dropdown-filter">
              <div class="max-w-xs w-full flex gap-x-2">
                <select id="hs-request-filter-priority" class="py-1 px-2.5 block w-28 bg-layer border-layer-line rounded-md sm:text-[13px] text-foreground focus:border-primary-focus focus:ring-primary-focus disabled:opacity-50 disabled:pointer-events-none">
                  <option value="">Priority</option>
                  <option value="LOW">Low</option>
                  <option value="MEDIUM">Medium</option>
                  <option value="HIGH">High</option>
                  <option value="CRITICAL">Critical</option>
                </select>
                <select id="hs-request-filter-status" class="py-1 px-2.5 block w-32 bg-layer border-layer-line rounded-md sm:text-[13px] text-foreground focus:border-primary-focus focus:ring-primary-focus disabled:opacity-50 disabled:pointer-events-none">
                  <option value="">Status</option>
                  <option value="OPEN">Open</option>
                  <option value="ASSIGNED">Assigned</option>
                  <option value="IN_PROGRESS">In Progress</option>
                  <option value="RESOLVED">Resolved</option>
                  <option value="CLOSED">Closed</option>
                </select>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="min-h-130 overflow-x-auto [&::-webkit-scrollbar]:h-2 [&::-webkit-scrollbar-thumb]:rounded-none [&::-webkit-scrollbar-track]:bg-scrollbar-track [&::-webkit-scrollbar-thumb]:bg-scrollbar-thumb">
        <table class="min-w-full">
          <thead class="border-y border-table-line">
            <tr>
              <th scope="col" class="py-1 ps-3 --exclude-from-ordering">
                <div class="flex items-center h-5">
                  <input id="hs-datatable-select-all-rows" type="checkbox" class="shrink-0 size-4 bg-transparent border-line-3 rounded-sm shadow-2xs text-primary focus:ring-0 focus:ring-offset-0 checked:bg-primary-checked checked:border-primary-checked disabled:opacity-50 disabled:pointer-events-none">
                  <label class="sr-only">Select all rows</label>
                </div>
              </th>
              <th scope="col" class="py-1 group text-start font-normal focus:outline-hidden">
                <div class="py-1 px-2.5 inline-flex items-center border border-transparent text-sm text-muted-foreground-1 rounded-md hover:border-line-2">
                  Title
                  <svg class="size-3.5 ms-1 -me-0.5 text-muted-foreground" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path class="hs-datatable-ordering-desc:text-primary" d="m7 15 5 5 5-5"></path><path class="hs-datatable-ordering-asc:text-primary" d="m7 9 5-5 5 5"></path></svg>
                </div>
              </th>
              <th scope="col" class="py-1 group text-start font-normal focus:outline-hidden">
                <div class="py-1 px-2.5 inline-flex items-center border border-transparent text-sm text-muted-foreground-1 rounded-md hover:border-line-2">
                  Category
                  <svg class="size-3.5 ms-1 -me-0.5 text-muted-foreground" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path class="hs-datatable-ordering-desc:text-primary" d="m7 15 5 5 5-5"></path><path class="hs-datatable-ordering-asc:text-primary" d="m7 9 5-5 5 5"></path></svg>
                </div>
              </th>
              <th scope="col" class="py-1 group text-start font-normal focus:outline-hidden">
                <div class="py-1 px-2.5 inline-flex items-center border border-transparent text-sm text-muted-foreground-1 rounded-md hover:border-line-2">
                  Priority
                  <svg class="size-3.5 ms-1 -me-0.5 text-muted-foreground" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path class="hs-datatable-ordering-desc:text-primary" d="m7 15 5 5 5-5"></path><path class="hs-datatable-ordering-asc:text-primary" d="m7 9 5-5 5 5"></path></svg>
                </div>
              </th>
              <th scope="col" class="py-1 group text-start font-normal focus:outline-hidden">
                <div class="py-1 px-2.5 inline-flex items-center border border-transparent text-sm text-muted-foreground-1 rounded-md hover:border-line-2">
                  Status
                  <svg class="size-3.5 ms-1 -me-0.5 text-muted-foreground" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path class="hs-datatable-ordering-desc:text-primary" d="m7 15 5 5 5-5"></path><path class="hs-datatable-ordering-asc:text-primary" d="m7 9 5-5 5 5"></path></svg>
                </div>
              </th>
              <th scope="col" class="py-1 group text-start font-normal focus:outline-hidden">
                <div class="py-1 px-2.5 inline-flex items-center border border-transparent text-sm text-muted-foreground-1 rounded-md hover:border-line-2">
                  Submitted
                  <svg class="size-3.5 ms-1 -me-0.5 text-muted-foreground" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path class="hs-datatable-ordering-desc:text-primary" d="m7 15 5 5 5-5"></path><path class="hs-datatable-ordering-asc:text-primary" d="m7 9 5-5 5 5"></path></svg>
                </div>
              </th>
              <th scope="col" class="py-2 px-3 text-end font-normal text-sm text-muted-foreground-1 --exclude-from-ordering">Action</th>
            </tr>
          </thead>

          <tbody class="divide-y divide-table-line">
            <tr th:each="t, stat : ${tickets}" class="hover:bg-muted-hover transition-colors">
              <td class="py-3 ps-3">
                <div class="flex items-center h-5">
                  <input th:id="|hs-table-filter-checkbox-${stat.index}|"
                         type="checkbox"
                         class="hs-datatable-select-row shrink-0 size-4 bg-transparent border-line-3 rounded-sm shadow-2xs text-primary focus:ring-0 focus:ring-offset-0 checked:bg-primary-checked checked:border-primary-checked disabled:opacity-50 disabled:pointer-events-none"
                         data-hs-datatable-row-selecting-individual>
                  <label th:for="|hs-table-filter-checkbox-${stat.index}|" class="sr-only">Select row</label>
                </div>
              </td>
              <td class="p-3 whitespace-nowrap text-sm font-medium text-foreground" th:text="${t.title}"></td>
              <td class="p-3 whitespace-nowrap text-sm text-foreground" th:text="${t.category}"></td>
              <td class="p-3 whitespace-nowrap text-sm text-foreground" th:text="${t.priority}"></td>
              <td class="p-3 whitespace-nowrap text-sm text-foreground" th:text="${t.status}"></td>
              <td class="p-3 whitespace-nowrap text-sm text-foreground" th:text="${#temporals.format(t.createdAt, 'dd MMM yyyy')}"></td>
              <td class="p-3 whitespace-nowrap text-end text-sm font-medium">
                <a th:href="@{/requests/{id}(id=${t.id})}"
                   class="inline-flex items-center gap-x-2 text-sm font-semibold rounded-lg text-primary hover:text-primary-hover focus:outline-hidden focus:text-primary-focus disabled:opacity-50 disabled:pointer-events-none">
                  View
                </a>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="flex flex-wrap justify-between items-center gap-2 mt-4">
        <div class="inline-flex items-center gap-1 hidden" data-hs-datatable-paging>
          <button type="button" class="p-2.5 min-w-10 inline-flex justify-center items-center gap-x-2 text-sm rounded-full text-foreground hover:bg-muted-hover focus:outline-hidden focus:bg-muted-focus disabled:opacity-50 disabled:pointer-events-none" data-hs-datatable-paging-prev>
            <span aria-hidden="true">«</span>
            <span class="sr-only">Previous</span>
          </button>
          <div class="flex items-center space-x-1 [&>.active]:bg-muted-active" data-hs-datatable-paging-pages></div>
          <button type="button" class="p-2.5 min-w-10 inline-flex justify-center items-center gap-x-2 text-sm rounded-full text-foreground hover:bg-muted-hover focus:outline-hidden focus:bg-muted-focus disabled:opacity-50 disabled:pointer-events-none" data-hs-datatable-paging-next>
            <span class="sr-only">Next</span>
            <span aria-hidden="true">»</span>
          </button>
        </div>
        <div class="whitespace-nowrap text-sm text-muted-foreground-1" data-hs-datatable-info>
          Showing
          <span data-hs-datatable-info-from></span>
          to
          <span data-hs-datatable-info-to></span>
          of
          <span data-hs-datatable-info-length></span>
          requests
        </div>
      </div>
    </div>

  </div>
</body>
</html>
