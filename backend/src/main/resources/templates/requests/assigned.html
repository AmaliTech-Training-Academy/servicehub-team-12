<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{components/layout :: page(~{::content})}">
<head><title>Assigned Tickets</title></head>
<body>
  <div th:fragment="content">

    <div class="mb-6">
      <h2 class="text-2xl font-semibold text-foreground">Assigned Tickets</h2>
      <p class="text-sm text-muted-foreground-1">Tickets currently assigned to you.</p>
    </div>

    <div th:if="${success}" class="flex items-center gap-3 bg-green-50 border border-green-200 text-green-700 text-sm rounded-lg px-4 py-3 mb-5">
      <svg class="size-4 shrink-0" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      <span th:text="${success}"></span>
    </div>
    <div th:if="${error}" class="flex items-center gap-3 bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3 mb-5">
      <svg class="size-4 shrink-0" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
      <span th:text="${error}"></span>
    </div>

    <div th:if="${assignedTickets == null or #lists.isEmpty(assignedTickets)}"
         class="bg-white border border-card-line rounded-xl shadow-sm p-4 sm:p-5">
      <div class="flex flex-col items-center justify-center py-16 text-center">
        <svg class="size-10 text-muted-foreground-2 opacity-30 mb-3" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/>
        </svg>
        <p class="text-sm text-muted-foreground-1">No tickets assigned to you.</p>
      </div>
    </div>

    <div th:if="${assignedTickets != null and not #lists.isEmpty(assignedTickets)}"
         id="hs-agent-assigned-table"
         class="bg-white border border-card-line rounded-xl shadow-sm p-4 sm:p-5 flex flex-col">
      <form method="get" th:action="@{/requests/assigned}" class="flex flex-wrap items-center gap-2 mb-4">
        <div class="grow">
          <div class="relative max-w-xs w-full">
            <label for="hs-assigned-table-filter-search" class="sr-only">Search</label>
             <input type="text" name="q" id="hs-assigned-table-filter-search"
                     class="py-1.5 sm:py-2 px-3 ps-9 block w-full bg-layer border-layer-line shadow-2xs rounded-lg sm:text-sm text-foreground placeholder:text-muted-foreground-1 focus:z-10 focus:border-primary-focus focus:ring-primary-focus disabled:opacity-50 disabled:pointer-events-none"
                     placeholder="Search assigned tickets"
                    th:value="${q}">
            <div class="absolute inset-y-0 start-0 flex items-center pointer-events-none ps-3">
              <svg class="size-4 text-muted-foreground" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            </div>
          </div>
        </div>

        <div class="flex items-center gap-2">
          <select name="priority" class="py-2 px-3 block w-28 bg-layer border border-layer-line rounded-lg sm:text-sm text-foreground focus:border-primary-focus focus:ring-primary-focus disabled:opacity-50 disabled:pointer-events-none">
            <option value="">Priority</option>
            <option value="LOW" th:selected="${priority == 'LOW'}">Low</option>
            <option value="MEDIUM" th:selected="${priority == 'MEDIUM'}">Medium</option>
            <option value="HIGH" th:selected="${priority == 'HIGH'}">High</option>
            <option value="CRITICAL" th:selected="${priority == 'CRITICAL'}">Critical</option>
          </select>
          <select name="status" class="py-2 px-3 block w-32 bg-layer border border-layer-line rounded-lg sm:text-sm text-foreground focus:border-primary-focus focus:ring-primary-focus disabled:opacity-50 disabled:pointer-events-none">
            <option value="">Status</option>
            <option value="OPEN" th:selected="${status == 'OPEN'}">Open</option>
            <option value="ASSIGNED" th:selected="${status == 'ASSIGNED'}">Assigned</option>
            <option value="IN_PROGRESS" th:selected="${status == 'IN_PROGRESS'}">In Progress</option>
            <option value="RESOLVED" th:selected="${status == 'RESOLVED'}">Resolved</option>
            <option value="CLOSED" th:selected="${status == 'CLOSED'}">Closed</option>
          </select>
          <button type="submit" class="py-2 px-3 inline-flex items-center gap-x-2 text-sm rounded-lg bg-layer border border-layer-line text-layer-foreground shadow-2xs hover:bg-layer-hover focus:outline-hidden focus:bg-layer-focus">Apply</button>
        </div>
      </form>

      <div class="min-h-130 overflow-x-auto [&::-webkit-scrollbar]:h-2 [&::-webkit-scrollbar-thumb]:rounded-none [&::-webkit-scrollbar-track]:bg-scrollbar-track [&::-webkit-scrollbar-thumb]:bg-scrollbar-thumb">
        <table class="min-w-full">
          <thead class="border-y border-table-line">
            <tr>
              <th scope="col" class="py-1 text-start font-normal">
                <div class="py-1 px-5 inline-flex items-center text-sm text-muted-foreground-1">Title</div>
              </th>
              <th scope="col" class="py-1 text-start font-normal">
                <div class="py-1 px-3 inline-flex items-center text-sm text-muted-foreground-1">Requester</div>
              </th>
              <th scope="col" class="py-1 text-start font-normal">
                <div class="py-1 px-3 inline-flex items-center text-sm text-muted-foreground-1">Category</div>
              </th>
              <th scope="col" class="py-1 text-start font-normal">
                <div class="py-1 px-3 inline-flex items-center text-sm text-muted-foreground-1">Priority</div>
              </th>
              <th scope="col" class="py-1 text-start font-normal">
                <div class="py-1 px-3 inline-flex items-center text-sm text-muted-foreground-1">SLA Deadline</div>
              </th>
              <th scope="col" class="py-1 text-start font-normal">
                <div class="py-1 px-3 inline-flex items-center text-sm text-muted-foreground-1">Status</div>
              </th>
              <th scope="col" class="py-2 px-5 text-end font-normal text-sm text-muted-foreground-1">Action</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-table-line">
            <tr th:each="t : ${assignedTickets}" class="hover:bg-muted-hover transition-colors">
              <td class="p-3 ps-5 whitespace-nowrap text-sm font-medium text-foreground" th:text="${t.title}"></td>
              <td class="p-3 whitespace-nowrap text-sm text-foreground" th:text="${t.requesterName}"></td>
              <td class="p-3 whitespace-nowrap text-sm text-foreground" th:text="${t.category}"></td>
              <td class="p-3 whitespace-nowrap text-sm text-foreground">
                <th:block th:replace="~{components/request-badges :: priorityBadge(${t.priority})}"></th:block>
              </td>
              <td class="p-3 whitespace-nowrap text-sm text-foreground"
                  th:text="${t.slaDeadline != null} ? ${#temporals.format(t.slaDeadline, 'dd MMM HH:mm')} : '—'"></td>
              <td class="p-3 whitespace-nowrap text-sm text-foreground">
                <th:block th:replace="~{components/request-badges :: statusBadge(${t.status})}"></th:block>
              </td>
              <td class="p-3 pe-5 whitespace-nowrap text-end text-sm font-medium">
                <form th:action="@{/requests/assigned/{id}/transition(id=${t.id})}" method="post" class="inline">
                  <input type="hidden" name="page" th:value="${currentPage}" />
                  <input th:if="${q != null and !#strings.isEmpty(q)}" type="hidden" name="q" th:value="${q}" />
                  <input th:if="${status != null and !#strings.isEmpty(status)}" type="hidden" name="status" th:value="${status}" />
                  <input th:if="${priority != null and !#strings.isEmpty(priority)}" type="hidden" name="priority" th:value="${priority}" />
                  <button type="submit"
                          class="inline-flex items-center gap-x-2 px-3 py-1.5 text-sm font-semibold rounded-lg bg-blue-600 text-white hover:bg-blue-700 focus:outline-hidden focus:bg-blue-700 disabled:opacity-50 disabled:pointer-events-none transition">
                    Transition
                  </button>
                </form>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="flex flex-wrap items-center justify-between gap-3 mt-5">
        <div class="whitespace-nowrap text-sm text-muted-foreground-1">
          Showing <span th:text="${startItem}">0</span> to <span th:text="${endItem}">0</span> of <span th:text="${totalItems}">0</span> tickets
        </div>

        <nav th:if="${totalPages > 1}" class="flex items-center gap-x-1" aria-label="Pagination">
          <a th:if="${hasPrevious}"
             th:href="@{/requests/assigned(page=${currentPage - 1}, q=${q}, status=${status}, priority=${priority})}"
             class="min-h-9.5 min-w-9.5 py-2 px-2.5 inline-flex justify-center items-center gap-x-1.5 text-sm rounded-lg text-foreground hover:bg-muted-hover focus:outline-hidden focus:bg-muted-focus">
            <svg aria-hidden="true" class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            <span>Previous</span>
          </a>
          <span th:unless="${hasPrevious}" class="min-h-9.5 min-w-9.5 py-2 px-2.5 inline-flex justify-center items-center gap-x-1.5 text-sm rounded-lg text-muted-foreground-1 opacity-50">
            <svg aria-hidden="true" class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            <span>Previous</span>
          </span>

          <div class="flex items-center gap-x-1">
            <a th:each="pageNumber : ${pageNumbers}"
               th:if="${pageNumber != '...'}"
               th:href="@{/requests/assigned(page=${pageNumber}, q=${q}, status=${status}, priority=${priority})}"
               th:text="${pageNumber}"
               th:classappend="${pageNumber == currentPage} ? ' bg-muted-active font-medium' : ''"
               class="min-h-9.5 min-w-9.5 flex justify-center items-center text-foreground hover:bg-muted-hover py-2 px-3 text-sm rounded-lg focus:outline-hidden focus:bg-muted-focus">1</a>
            <span th:each="pageNumber : ${pageNumbers}"
                  th:if="${pageNumber == '...'}"
                  class="min-h-9.5 min-w-9.5 inline-flex justify-center items-center py-2 px-1 text-sm text-muted-foreground-1">...</span>
          </div>

          <a th:if="${hasNext}"
             th:href="@{/requests/assigned(page=${currentPage + 1}, q=${q}, status=${status}, priority=${priority})}"
             class="min-h-9.5 min-w-9.5 py-2 px-2.5 inline-flex justify-center items-center gap-x-1.5 text-sm rounded-lg text-foreground hover:bg-muted-hover focus:outline-hidden focus:bg-muted-focus">
            <span>Next</span>
            <svg aria-hidden="true" class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
          </a>
          <span th:unless="${hasNext}" class="min-h-9.5 min-w-9.5 py-2 px-2.5 inline-flex justify-center items-center gap-x-1.5 text-sm rounded-lg text-muted-foreground-1 opacity-50">
            <span>Next</span>
            <svg aria-hidden="true" class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
          </span>
        </nav>
      </div>
    </div>

  </div>
</body>
</html>
